version: 1.0.0
experiment_name: gemma3_spps_tda_sweep
model_config:
  model_id: google/gemma-3-4b-it
  device: mps
  precision: bfloat16
  attn_implementation: eager
  cache_dir: ./models/hf-cache
pipelines:
  subspace_identity:
    enabled: true
    layer_target: 12
    classes_g1:
    - capital
    - country
    - place of birth
    classes_g2:
    - author
    - director
    - screenwriter
    seed: 42
  causal_scrubbing:
    enabled: true
    layer_target: 12
    target_classes:
    - capital
    - country
    - place of birth
    seed: 100
  freeman_stabilization:
    enabled: true
    layer_intervention: 12
    layer_capture_start: 20
    layer_capture_end: 26
    target_classes:
    - capital
    - country
    - place of birth
    seed: 42
observability:
  logger: logfire
  log_level: INFO
  save_plots: true
  plots_dir: docs/antigr_reports
  send_to_logfire: true
