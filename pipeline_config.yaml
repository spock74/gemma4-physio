version: "1.0.0"
experiment_name: "gemma3_spps_tda_sweep"

model_config:
  model_id: "google/gemma-3-4b-it"
  device: "mps"
  precision: "bfloat16"
  attn_implementation: "eager"
  cache_dir: "./models/hf-cache"

pipelines:
  direction_extraction:
    enabled: true
    dataset_path: "data/eval/entity_knowledge_contrast.json"
    layer_target: 12
    sample_size: 8
    output_vector_path: "data/vectors/d_know.pt"

  topological_sweep:
    enabled: true
    layer_intervention: 12
    layer_capture: 13
    magnitude_R: 15000.0
    control_planes_K: 30
    angles_deg: [0, 40, 80, 120, 160, 200, 240, 280, 320, 360]
    tda_config:
      max_dimension: 1
      betti_0_threshold_ratio: 0.5
      output_json_path: "results/topology_sweep_singleshot.json"

  weight_amortization:
    enabled: false
    layer_target: 7
    epochs: 35
    learning_rate: 0.000015
    optimizer: "AdamW"
    lambda_scale: 1.0
    output_model_path: "models/casal_amortized/"

observability:
  logger: "logfire"
  log_level: "INFO"
  save_plots: true
  plots_dir: "docs/antigr_reports"
