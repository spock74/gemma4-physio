version: 1.0.0
experiment_name: gemma3_spps_tda_sweep
model_config:
  model_id: google/gemma-3-4b-it
  device: mps
  precision: bfloat16
  attn_implementation: eager
  cache_dir: ./models/hf-cache
pipelines:
  subspace_identity:
    enabled: true
    layer_target: 12
    classes_g1:
    - capital
    - country
    - place of birth
    classes_g2:
    - author
    - director
    - screenwriter
    seed: 42
  causal_scrubbing:
    enabled: true
    layer_target: 12
    target_classes:
    - capital
    - country
    - place of birth
    seed: 100
  freeman_stabilization:
    enabled: true
    target_classes:
      - screenwriter
      - producer
      - author
      - director
      - composer
    layer_target: 12
    layers_repair: [20, 21, 22, 23, 24, 25, 26]
    perturbation_magnitude: 15000.0
    seed: 100
  multi_causal_scrubbing:
    enabled: true
    target_classes:
    - capital
    - country
    - place of birth
    layers_target: [12, 20, 21, 22, 23, 24, 25, 26]
    seed: 100
observability:
  logger: logfire
  log_level: INFO
  save_plots: true
  plots_dir: docs/antigr_reports
  send_to_logfire: true
